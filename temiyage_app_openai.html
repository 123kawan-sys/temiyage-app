<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="手土産アプリ">
<title>手土産アプリ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f7; color: #1c1c1e; max-width: 480px; margin: 0 auto; min-height: 100vh; }

/* Nav */
.nav { display: flex; background: #fff; border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; z-index: 100; }
.nav-btn { flex: 1; padding: 12px 4px 10px; font-size: 11px; font-weight: 600; border: none; background: none; color: #8e8e93; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.nav-btn.active { color: #1c1c1e; border-bottom-color: #1c1c1e; }

/* Page */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* Section */
.section { margin-bottom: 18px; }
.lbl { font-size: 11px; font-weight: 600; color: #8e8e93; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 7px; }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip { font-size: 13px; padding: 6px 13px; border-radius: 20px; border: 1px solid #d1d1d6; color: #8e8e93; background: #fff; cursor: pointer; transition: all 0.12s; user-select: none; }
.chip.on { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }

/* Tab */
.tab-row { display: flex; gap: 6px; margin-bottom: 10px; }
.tab { font-size: 13px; font-weight: 600; padding: 6px 18px; border-radius: 20px; border: 1px solid #d1d1d6; color: #8e8e93; cursor: pointer; }
.tab.on { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }

/* Input */
input[type=text], input[type=date], select, textarea {
  width: 100%; font-size: 14px; padding: 10px 12px;
  border-radius: 10px; border: 1px solid #d1d1d6;
  background: #fff; color: #1c1c1e;
  -webkit-appearance: none; appearance: none;
}
input[type=range] { width: 100%; accent-color: #1c1c1e; height: 4px; }

/* Budget */
.budget-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.budget-val { font-size: 20px; font-weight: 700; color: #1c1c1e; }
.budget-ticks { display: flex; justify-content: space-between; margin-top: 6px; }
.budget-tick { font-size: 10px; color: #8e8e93; }

/* Date row */
.date-row { display: flex; align-items: center; gap: 10px; }
.date-display { font-size: 14px; font-weight: 500; color: #1c1c1e; min-width: 80px; }
.date-display.empty { color: #8e8e93; }
.cal-btn { display: flex; align-items: center; gap: 5px; padding: 8px 14px; border-radius: 10px; border: 1px solid #d1d1d6; background: #fff; color: #1c1c1e; font-size: 13px; cursor: pointer; }
.date-clear { font-size: 18px; color: #8e8e93; cursor: pointer; padding: 4px; }

/* Delivery box */
.delivery-box { background: #f2f2f7; border-radius: 12px; padding: 12px; margin-top: 8px; }
.delivery-box .lbl { margin-bottom: 8px; }
.delivery-box input { margin-top: 8px; }

/* Go button */
.go-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 14px; border: none; background: #1c1c1e; color: #fff; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
.go-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Divider */
.divider { border: none; border-top: 1px solid #e5e5ea; margin: 6px 0 16px; }

/* Hint */
.hint { font-size: 11px; color: #8e8e93; margin-top: -12px; margin-bottom: 14px; line-height: 1.5; }

/* Loading */
.loading { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 2px solid #e5e5ea; border-top-color: #1c1c1e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-box { background: #fff0f0; border-radius: 12px; padding: 14px; text-align: center; font-size: 13px; color: #c0392b; }

/* Result */
.result-header { font-size: 13px; font-weight: 600; color: #8e8e93; margin-bottom: 12px; }
.gift-card { background: #fff; border-radius: 16px; border: 1px solid #e5e5ea; overflow: hidden; margin-bottom: 12px; cursor: pointer; transition: transform 0.1s; }
.gift-card:active { transform: scale(0.98); }
.gift-imgs { display: grid; grid-template-columns: 1fr 1fr; height: 100px; }
.gift-img { background: #f2f2f7; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #8e8e93; border-right: 1px solid #e5e5ea; }
.gift-img:last-child { border-right: none; }
.gift-img img { width: 100%; height: 100%; object-fit: cover; }
.gift-body { padding: 12px 14px; }
.gift-name { font-size: 14px; font-weight: 700; color: #1c1c1e; margin-bottom: 3px; }
.gift-shop { font-size: 12px; color: #8e8e93; margin-bottom: 6px; }
.gift-foot { display: flex; justify-content: space-between; align-items: center; }
.gift-price { font-size: 15px; font-weight: 700; color: #1c1c1e; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: #e8f4fd; color: #1a73e8; }
.badge-warn { background: #fff3cd; color: #856404; }
.badge-danger { background: #fde8e8; color: #c0392b; }
.badge-season { background: #e8f5e9; color: #2e7d32; }
.gift-reason { font-size: 12px; color: #8e8e93; margin-top: 6px; line-height: 1.5; }
.expiry-alert { font-size: 11px; color: #c0392b; margin-top: 4px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 16px; }
.modal-handle { width: 36px; height: 4px; background: #d1d1d6; border-radius: 2px; margin: 0 auto 14px; }
.modal-imgs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.modal-img { height: 110px; background: #f2f2f7; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #8e8e93; overflow: hidden; }
.modal-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
.modal-name { font-size: 18px; font-weight: 700; color: #1c1c1e; margin-bottom: 2px; }
.modal-shop { font-size: 13px; color: #8e8e93; margin-bottom: 12px; }
.modal-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #f2f2f7; font-size: 13px; }
.modal-lbl { color: #8e8e93; }
.modal-val { color: #1c1c1e; font-weight: 600; text-align: right; max-width: 60%; line-height: 1.5; }
.modal-val.warn { color: #856404; }
.modal-val.danger { color: #c0392b; }
.order-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 14px; border: none; background: #1c1c1e; color: #fff; cursor: pointer; margin-top: 14px; }
.modal-close { width: 100%; padding: 12px; font-size: 14px; border-radius: 14px; border: 1px solid #d1d1d6; background: none; color: #8e8e93; cursor: pointer; margin-top: 8px; }

/* Order sheet */
.order-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: flex-end; justify-content: center; }
.order-overlay.open { display: flex; }
.order-sheet { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 16px; }
.order-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.order-sub { font-size: 13px; color: #8e8e93; margin-bottom: 14px; }
.order-summary { background: #f2f2f7; border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: #8e8e93; line-height: 2.1; }
.order-summary span { color: #1c1c1e; font-weight: 600; }
.send-methods { display: flex; gap: 8px; margin-bottom: 12px; }
.send-method { flex: 1; padding: 10px 4px; font-size: 13px; font-weight: 600; border-radius: 12px; border: 1px solid #d1d1d6; background: #fff; color: #8e8e93; cursor: pointer; text-align: center; }
.send-method.on { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }
.send-input { margin-bottom: 12px; }
.send-execute { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 14px; border: none; background: #1c1c1e; color: #fff; cursor: pointer; }
.order-back { width: 100%; padding: 12px; font-size: 14px; border-radius: 14px; border: 1px solid #d1d1d6; background: none; color: #8e8e93; cursor: pointer; margin-top: 8px; }
.sent-wrap { text-align: center; padding: 30px 16px; }
.sent-icon { width: 56px; height: 56px; border-radius: 50%; background: #e8f5e9; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 26px; }

/* History */
.search-box-wrap { position: relative; margin-bottom: 10px; }
.search-box { width: 100%; font-size: 14px; padding: 10px 12px 10px 36px; border-radius: 12px; border: 1px solid #d1d1d6; background: #f2f2f7; color: #1c1c1e; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #8e8e93; font-size: 15px; }
.filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip { font-size: 12px; padding: 5px 12px; border-radius: 16px; border: 1px solid #d1d1d6; color: #8e8e93; background: #fff; cursor: pointer; white-space: nowrap; }
.filter-chip.on { background: #1c1c1e; color: #fff; border-color: #1c1c1e; font-weight: 600; }
.company-block { margin-bottom: 16px; }
.company-hd { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 6px; border-bottom: 1px solid #e5e5ea; margin-bottom: 8px; }
.company-name { font-size: 14px; font-weight: 700; }
.company-count { font-size: 11px; color: #8e8e93; }
.h-item { display: flex; gap: 10px; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #f2f2f7; }
.h-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.h-date { font-size: 11px; color: #8e8e93; min-width: 40px; padding-top: 2px; }
.h-body { flex: 1; }
.h-name { font-size: 13px; font-weight: 700; color: #1c1c1e; margin-bottom: 2px; }
.h-detail { font-size: 11px; color: #8e8e93; line-height: 1.5; margin-bottom: 3px; }
.h-footer { display: flex; justify-content: space-between; align-items: center; }
.h-person { font-size: 11px; color: #8e8e93; }
.no-result { text-align: center; padding: 40px 0; font-size: 14px; color: #8e8e93; }

/* Add/Delete */
.list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.list-count { font-size: 14px; font-weight: 700; }
.add-new-btn { font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 20px; border: 1px solid #d1d1d6; background: #fff; color: #1c1c1e; cursor: pointer; }
.gift-list-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f2f2f7; }
.gift-list-item:last-child { border-bottom: none; }
.gift-thumb { width: 44px; height: 44px; border-radius: 10px; background: #f2f2f7; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #8e8e93; }
.gift-thumb img { width: 100%; height: 100%; object-fit: cover; }
.gift-info { flex: 1; min-width: 0; }
.gift-list-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gift-list-sub { font-size: 11px; color: #8e8e93; margin-top: 2px; }
.del-btn { font-size: 12px; padding: 5px 10px; border-radius: 8px; border: 1px solid #fde8e8; color: #c0392b; background: #fff; cursor: pointer; flex-shrink: 0; }
.del-confirm { background: #fde8e8; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
.del-confirm-txt { font-size: 13px; color: #c0392b; margin-bottom: 10px; line-height: 1.5; }
.del-btns { display: flex; gap: 8px; }
.del-btns button { flex: 1; padding: 8px; font-size: 13px; border-radius: 10px; cursor: pointer; }
.del-yes { border: 1px solid #c0392b; background: none; color: #c0392b; font-weight: 600; }
.del-no { border: 1px solid #d1d1d6; background: none; color: #8e8e93; }
.cat-filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
.cat-filter-row::-webkit-scrollbar { display: none; }

/* Add form */
.add-page { display: none; }
.add-page.active { display: block; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.form-row input, .form-row select { margin-bottom: 0; }
.field-lbl { font-size: 11px; font-weight: 600; color: #8e8e93; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 5px; }
.photo-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.photo-slot { height: 90px; border: 2px dashed #d1d1d6; border-radius: 14px; background: #f2f2f7; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; color: #8e8e93; gap: 5px; transition: all 0.15s; }
.photo-slot.filled { border-style: solid; border-color: #1c1c1e; background: #fff; color: #1c1c1e; }
.photo-slot-icon { font-size: 22px; }
.save-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 14px; border: none; background: #1c1c1e; color: #fff; cursor: pointer; margin-bottom: 10px; }
.back-btn { width: 100%; padding: 12px; font-size: 14px; border-radius: 14px; border: 1px solid #d1d1d6; background: none; color: #8e8e93; cursor: pointer; }
.success-wrap { text-align: center; padding: 50px 20px; }
.success-icon { width: 60px; height: 60px; border-radius: 50%; background: #e8f5e9; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 28px; }

/* API key */
.api-section { background: #fff; border-radius: 14px; border: 1px solid #e5e5ea; padding: 14px; margin-bottom: 16px; }
.api-note { font-size: 11px; color: #8e8e93; margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>

<div style="background:#1c1c1e;padding:12px 16px 10px;text-align:center">
  <span style="color:#fff;font-size:16px;font-weight:700;letter-spacing:0.05em">手土産アプリ</span>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="showPage('search')">候補検索</button>
  <button class="nav-btn" onclick="showPage('history')">履歴</button>
  <button class="nav-btn" onclick="showPage('adddelete')">追加・削除</button>
</div>

<!-- 候補検索 -->
<div id="page-search" class="page active">


  <div class="section">
    <div class="lbl">発注者</div>
    <div class="tab-row" id="dept-tabs"></div>
    <div class="chips" id="member-chips"></div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="lbl">訪問目的</div>
    <div class="chips" id="purpose-chips"></div>
  </div>

  <div class="section">
    <div class="lbl">相手の役職</div>
    <div class="chips" id="role-chips"></div>
  </div>

  <div class="section">
    <div class="lbl" id="headcount-label">訪問先の人数</div>
    <div class="chips" id="headcount-chips"></div>
    <div class="hint" id="headcount-hint"></div>
  </div>

  <div class="section">
    <div class="lbl">相手の所在地</div>
    <div class="chips" id="region-chips"></div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="lbl">渡す日</div>
    <div style="position:relative;display:inline-block;width:100%">
      <div id="date-btn" onclick="document.getElementById('date-input').focus()"
        style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;border:1px solid #d1d1d6;background:#fff;cursor:pointer">
        <span id="date-display-text" style="font-size:14px;color:#8e8e93">タップして日付を選ぶ</span>
        <span id="date-clear" style="display:none;font-size:18px;color:#8e8e93" onclick="event.stopPropagation();clearDate()">×</span>
      </div>
      <input type="date" id="date-input" onchange="setDate(this.value)"
        style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:1">
    </div>
  </div>

  <div class="section">
    <div class="lbl">予算レンジ</div>
    <div class="chips" id="budget-chips"></div>
  </div>

  <div class="section">
    <div class="lbl">持参 or 配送</div>
    <div class="chips" id="delivery-chips"></div>
    <div id="delivery-box" style="display:none">
      <div class="delivery-box">
        <div class="lbl">送り先</div>
        <div class="chips" id="delivery-to-chips"></div>
        <input type="text" id="delivery-addr" placeholder="住所を入力（任意）" style="margin-top:8px">
      </div>
    </div>
  </div>

  <button class="go-btn" id="go-btn" disabled onclick="generateCandidates()">条件をすべて選んでください</button>

  <div id="result-area" style="margin-top:20px"></div>
</div>

<!-- 履歴 -->
<div id="page-history" class="page">
  <div class="search-box-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-box" id="history-search" placeholder="社名・商品名・担当者で検索" oninput="renderHistory()">
  </div>
  <div class="filter-row" id="history-filters"></div>
  <div id="history-content"></div>
</div>

<!-- 追加・削除 -->
<div id="page-adddelete" class="page">
  <div id="add-list-view">
    <div class="list-header">
      <span class="list-count" id="gift-count"></span>
      <button class="add-new-btn" onclick="showAddForm()">＋ 新規追加</button>
    </div>
    <div class="search-box-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-box" id="gift-search" placeholder="店舗名・商品名で検索" oninput="renderGiftList()">
    </div>
    <div class="cat-filter-row" id="cat-filters"></div>
    <div id="del-confirm-area"></div>
    <div id="gift-list"></div>
  </div>

  <div id="add-form-view" style="display:none">
    <div id="add-step-1">
      <div class="section">
        <div class="field-lbl">商品名</div>
        <input type="text" id="add-name" placeholder="例：焼菓子詰合せ A">
      </div>
      <div class="form-row">
        <div>
          <div class="field-lbl">店舗名</div>
          <input type="text" id="add-shop" placeholder="例：鈴懸">
        </div>
        <div>
          <div class="field-lbl">購入場所</div>
          <input type="text" id="add-loc" placeholder="例：岩田屋">
        </div>
      </div>
      <div class="form-row">
        <div>
          <div class="field-lbl">カテゴリ</div>
          <select id="add-cat">
            <option>洋菓子</option><option>和菓子</option><option>チョコレート</option>
            <option>カステラ</option><option>最中</option><option>食品</option>
          </select>
        </div>
        <div>
          <div class="field-lbl">価格（税込）</div>
          <input type="text" id="add-price" placeholder="3,000">
        </div>
      </div>
      <div class="form-row">
        <div>
          <div class="field-lbl">賞味期限（日数）</div>
          <input type="text" id="add-expiry" placeholder="30">
        </div>
        <div>
          <div class="field-lbl">要冷蔵</div>
          <select id="add-cold"><option value="">不要</option><option value="要冷蔵">要冷蔵</option></select>
        </div>
      </div>
      <div class="section">
        <div class="field-lbl">季節限定</div>
        <div class="chips" id="season-chips-add"></div>
      </div>
      <div class="section">
        <div class="field-lbl">適した訪問目的（複数可）</div>
        <div class="chips" id="purpose-chips-add"></div>
      </div>
      <div class="section">
        <div class="field-lbl">備考</div>
        <input type="text" id="add-note" placeholder="例：リボンラッピング無料">
      </div>
      <button class="save-btn" onclick="showAddStep2()">次へ：写真を登録 →</button>
      <button class="back-btn" onclick="showListView()">一覧に戻る</button>
    </div>

    <div id="add-step-2" style="display:none">
      <div class="section">
        <div class="field-lbl" style="margin-bottom:10px">写真を登録（各1枚）</div>
        <div class="photo-area">
          <label for="photo-input-1" style="cursor:pointer">
            <div class="photo-slot" id="photo-slot-1">
              <div class="photo-slot-icon" id="photo-icon-1">📷</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">

</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxcEXLzjVzCymWNmBHxSsDPHBeloFqVpZMeQQwKe69YeBO5mkWiB4Mata5p_ppHvaZofQ/exec';

const DEPTS = {
  'BR': ['久積','河埜','宮原','廣野','佐藤','牧田','窪田','久保'],
  'PM': ['小島','森崎','中村聖','鳥海','矢島','奥村','宮園','下田','栗林','村田','空閑','中村美','萩原','西山','池田','藤田'],
};

const HISTORY_DATA_DEMO = [];

// State
const S = {
  dept:'BR', person:null, purpose:null, role:null, headcount:null, region:null,
  date:'', budgetMin:0, budgetMax:15000, budgetLabel:'指定なし', delivery:false, deliveryTo:'', deliveryAddr:'',
  hFilter:'すべて',
  catFilter:'すべて',
  deleteTarget:null,
  photo1:false, photo2:false,
  addPurposes:[], addSeason:null,
  pickedGift:null,
  orderMethod:'コピー', orderSent:false,
  orderCompany:'',
  gifts:[],
  historyData:[],
  sheetsLoaded:false,
};

// ===== INIT =====
window.onload = async () => {

  renderDeptTabs();
  renderMemberChips();
  renderPurposeChips();
  renderRoleChips();
  renderHeadcountChips();
  renderRegionChips();
  renderDeliveryChips();
  renderBudgetChips();
  renderAddPurposeChips();
  renderSeasonChipsAdd();
  renderCatFilters();
  renderHistoryFilters();
  await loadGiftsFromSheets();


};

// ===== SHEETS =====
async function loadGiftsFromSheets() {
  try {
    const res = await fetch(SHEETS_URL);
    const data = await res.json();
    // 履歴シートのデータも読み込む
    try {
      const hres = await fetch(SHEETS_URL + '?sheet=履歴');
      const hdata = await hres.json();
      if (Array.isArray(hdata)) {
        S.historyData = hdata.map(r => ({
          company: r['お渡し先'] || '',
          date: r['日付'] || '',
          name: r['商品名'] || '',
          detail: (r['店舗名']||'') + '｜' + (r['内容']||'') + '｜¥' + (r['価格']||''),
          person: r['発注者'] || '',
          purpose: r['目的'] || '',
          delivery: r['持参配送'] === '配送',
        })).filter(r => r.company);
      }
    } catch(e2) { console.log('履歴読み込みエラー:', e2); }
    if (Array.isArray(data) && data.length > 0) {
      S.gifts = data.map((row, i) => ({
        id: row['ID'] || i+1,
        name: row['商品名'] || '',
        shop: row['店舗名'] || '',
        loc: row['購入場所'] || '',
        cat: row['カテゴリ'] || '',
        price: row['価格（税込）'] ? Number(row['価格（税込）']) : null,
        detail: row['内容・個数'] || '',
        purpose: row['訪問目的'] ? row['訪問目的'].split(',').map(s=>s.trim()) : [],
        note: row['備考'] || '',
        cold: row['要冷蔵'] === '〇' || row['要冷蔵'] === '要冷蔵',
        season: row['季節限定'] || null,
        expiry: row['賞味期限（日数）'] ? Number(row['賞味期限（日数）']) : null,
        photo1: row['写真URL（外観）'] || null,
        photo2: row['写真URL（中身）'] || null,
      })).filter(g => g.name);
      S.sheetsLoaded = true;
    }
  } catch(e) {
    console.log('シート読み込みエラー:', e);
  }
  renderGiftList();
  renderGiftCount();
}

// ===== NAV =====
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const idx = {'search':0,'history':1,'adddelete':2}[page];
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (page === 'history') renderHistory();
  if (page === 'adddelete') renderGiftList();
}

// ===== SEARCH =====
function renderDeptTabs() {
  const el = document.getElementById('dept-tabs');
  el.innerHTML = Object.keys(DEPTS).map(d =>
    `<div class="tab ${S.dept===d?'on':''}" onclick="selectDept('${d}')">${d}</div>`
  ).join('');
}
function selectDept(d) { S.dept=d; S.person=null; renderDeptTabs(); renderMemberChips(); updateGoBtn(); }
function renderMemberChips() {
  const el = document.getElementById('member-chips');
  el.innerHTML = DEPTS[S.dept].map(m =>
    `<div class="chip ${S.person===m?'on':''}" onclick="selectMember('${m}')">${m}</div>`
  ).join('');
}
function selectMember(m) { S.person=m; renderMemberChips(); updateGoBtn(); }

function renderPurposeChips() {
  const el = document.getElementById('purpose-chips');
  el.innerHTML = ['会食','訪問','御礼','謝罪'].map(v =>
    `<div class="chip ${S.purpose===v?'on':''}" onclick="selectPurpose('${v}')">${v}</div>`
  ).join('');
}
function selectPurpose(v) {
  S.purpose=v; S.headcount=null;
  renderPurposeChips(); renderHeadcountChips(); updateGoBtn();
}

function renderRoleChips() {
  const el = document.getElementById('role-chips');
  el.innerHTML = ['担当者','部長・課長','役員・社長'].map(v =>
    `<div class="chip ${S.role===v?'on':''}" onclick="selectRole('${v}')">${v}</div>`
  ).join('');
}
function selectRole(v) { S.role=v; renderRoleChips(); updateGoBtn(); }

function renderHeadcountChips() {
  const isKai = S.purpose === '会食';
  const opts = isKai ? ['1人','2人','3人','4人','5人以上'] : ['1〜10人','10〜20人','20〜30人','30人以上'];
  document.getElementById('headcount-label').textContent = isKai ? '相手方の参加人数' : '訪問先の人数';
  document.getElementById('headcount-hint').textContent = isKai ? '手土産の個数・サイズ感の目安になります' : '個包装の数量・箱サイズの目安になります';
  const el = document.getElementById('headcount-chips');
  el.innerHTML = opts.map(v =>
    `<div class="chip ${S.headcount===v?'on':''}" onclick="selectHeadcount('${v}')">${v}</div>`
  ).join('');
}
function selectHeadcount(v) { S.headcount=v; renderHeadcountChips(); updateGoBtn(); }

function renderRegionChips() {
  const el = document.getElementById('region-chips');
  el.innerHTML = ['福岡（地元）','九州内','県外'].map(v =>
    `<div class="chip ${S.region===v?'on':''}" onclick="selectRegion('${v}')">${v}</div>`
  ).join('');
}
function selectRegion(v) { S.region=v; renderRegionChips(); updateGoBtn(); }

function setDate(v) {
  S.date = v;
  if (v) {
    const d = new Date(v + 'T00:00:00');
    const txt = (d.getMonth()+1) + '月' + d.getDate() + '日';
    document.getElementById('date-display-text').textContent = txt;
    document.getElementById('date-display-text').style.color = '#1c1c1e';
    document.getElementById('date-clear').style.display = 'inline';
  }
}
function clearDate() {
  S.date = '';
  const el = document.getElementById('date-input');
  if (el) el.value = '';
  document.getElementById('date-display-text').textContent = 'タップして日付を選ぶ';
  document.getElementById('date-display-text').style.color = '#8e8e93';
  document.getElementById('date-clear').style.display = 'none';
}


const BUDGET_OPTIONS = [
  {label:'指定なし', min:0, max:99999},
  {label:'〜¥3,000', min:0, max:3000},
  {label:'¥3,000〜¥5,000', min:3000, max:5000},
  {label:'¥5,000〜¥10,000', min:5000, max:10000},
  {label:'¥10,000〜¥15,000', min:10000, max:15000},
];

function renderBudgetChips() {
  const el = document.getElementById('budget-chips');
  if (!el) return;
  el.innerHTML = BUDGET_OPTIONS.map(o =>
    `<div class="chip ${S.budgetLabel===o.label?'on':''}" onclick="selectBudget('${o.label}',${o.min},${o.max})">${o.label}</div>`
  ).join('');
}

function selectBudget(label, min, max) {
  S.budgetLabel = label;
  S.budgetMin = min;
  S.budgetMax = max;
  renderBudgetChips();
  updateGoBtn();
}

function renderDeliveryChips() {
  const el = document.getElementById('delivery-chips');
  el.innerHTML = ['持参','配送'].map(v => {
    const on = (v==='配送' && S.delivery) || (v==='持参' && !S.delivery);
    return `<div class="chip ${on?'on':''}" onclick="selectDelivery('${v}')">${v}</div>`;
  }).join('');
  document.getElementById('delivery-box').style.display = S.delivery ? 'block' : 'none';
}
function selectDelivery(v) {
  S.delivery = (v==='配送');
  renderDeliveryChips();
  renderBudgetChips();
  if (S.delivery) {
    const el = document.getElementById('delivery-to-chips');
    el.innerHTML = ['先方オフィス','ホテル','自宅'].map(t =>
      `<div class="chip ${S.deliveryTo===t?'on':''}" onclick="selectDeliveryTo('${t}')">${t}</div>`
    ).join('');
  }
}
function selectDeliveryTo(v) {
  S.deliveryTo = v;
  const el = document.getElementById('delivery-to-chips');
  el.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c.textContent===v));
}

function updateGoBtn() {
  const btn = document.getElementById('go-btn');
  const ok = S.person && S.purpose && S.role && S.headcount && S.region;
  btn.disabled = !ok;
  btn.textContent = ok ? `${S.person}さんの候補を生成 ↗` : '条件をすべて選んでください';
}

function daysLeft() {
  if (!S.date) return null;
  return Math.round((new Date(S.date) - new Date()) / 86400000);
}
function expiryAlert(g) {
  const d = daysLeft();
  if (d !== null && g.expiry && d > g.expiry) return `渡す日まで${d}日。賞味期限（約${g.expiry}日）に注意`;
  return null;
}

async function generateCandidates() {
  const resultArea = document.getElementById('result-area');
  const btn = document.getElementById('go-btn');
  btn.disabled = true;
  btn.textContent = '生成中...';
  resultArea.innerHTML = '<div class="loading"><div class="spinner"></div>AIが候補を選定しています...</div>';

  const dl = daysLeft();
  const budget = S.budgetMax;
  const budgetMin = S.budgetMin;
  const filtered = S.gifts.filter(g => {
    if (S.budgetLabel === '指定なし') return true;
    if (g.price && g.price > budget) return false;
    if (budgetMin > 0 && g.price && g.price < budgetMin) return false;
    return true;
  });

  const regionCtx = {
    '福岡（地元）': '相手は福岡在住のため、定番品は避け特別感のある品・季節限定品を優先。',
    '九州内': '相手は九州内（福岡以外）在住のため、福岡銘品で現地入手困難なものが喜ばれる。',
    '県外': '相手は県外在住のため、福岡・九州らしさが伝わる名品を優先。',
  }[S.region] || '';

  const prompt = `あなたは法人営業の手土産選定の専門家です。以下の条件と社内承認済みリストから最適な商品を3〜5点選んでください。

【条件】
- 発注者：${S.person}（${S.dept}）
- 訪問目的：${S.purpose}
- 相手の役職：${S.role}
- ${S.purpose==='会食'?'参加人数':'訪問先人数'}：${S.headcount}
- 相手の所在地：${S.region}
- 渡す日：${S.date||'未定'}${dl!==null?`（${dl}日後）`:''}
- 予算レンジ：${S.budgetLabel==='指定なし'?'指定なし':'¥'+budgetMin.toLocaleString()+'〜¥'+budget.toLocaleString()}
- ${S.delivery?`配送先：${S.deliveryTo} ${document.getElementById('delivery-addr').value}`:'持参'}
- 所在地方針：${regionCtx}

【社内承認済みリスト】
${JSON.stringify(filtered.map(g=>({id:g.id,name:g.name,shop:g.shop,detail:g.detail,price:g.price,cat:g.cat,purpose:g.purpose,cold:g.cold,expiry:g.expiry,season:g.season})))}

以下のJSON形式のみで返答（他テキスト不要）：
[{"id":数値,"reason":"おすすめ理由（40字以内）","tag":"ラベル（定番/格上げ/季節感/話題性）"}]`;

  try {
    const res = await fetch(SHEETS_URL + '?action=ai&prompt=' + encodeURIComponent(prompt));
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const text = data.choices[0].message.content;
    const picks = JSON.parse(text.replace(/```json|```/g,'').trim());
    const results = picks.map(p => ({...S.gifts.find(g=>g.id==p.id), reason:p.reason, tag:p.tag})).filter(Boolean);
    S.pickedResults = results;
    renderResults(results);
  } catch(e) {
    resultArea.innerHTML = `<div class="error-box">エラー：${e.message||'生成に失敗しました'}</div>`;
  }
  btn.disabled = false;
  btn.textContent = `${S.person}さんの候補を生成 ↗`;
}

function renderResults(gifts) {
  const dl = daysLeft();
  let html = `<div class="result-header">おすすめ候補 ${gifts.length}件（タップで詳細）</div>`;
  gifts.forEach(g => {
    const al = expiryAlert(g);
    html += `<div class="gift-card" onclick="showModal(${JSON.stringify(g).replace(/"/g,'&quot;')})">
      <div class="gift-imgs">
        <div class="gift-img">${g.photo1?`<img src="${g.photo1}" onerror="this.parentNode.innerHTML='外観写真'">`:'外観写真'}</div>
        <div class="gift-img">${g.photo2?`<img src="${g.photo2}" onerror="this.parentNode.innerHTML='中身写真'">`:'中身写真'}</div>
      </div>
      <div class="gift-body">
        <div class="gift-name">${g.name}</div>
        <div class="gift-shop">${g.shop}（${g.loc}）</div>
        <div class="gift-foot">
          <span class="gift-price">${g.price?'¥'+g.price.toLocaleString():'要確認'}</span>
          <div class="badges">
            <span class="badge">${g.tag||g.cat}</span>
            ${g.cold?'<span class="badge badge-warn">要冷蔵</span>':''}
            ${g.season?`<span class="badge badge-season">${g.season}</span>`:''}
            ${al?'<span class="badge badge-danger">期限注意</span>':''}
          </div>
        </div>
        <div class="gift-reason">${g.reason||''}</div>
        ${al?`<div class="expiry-alert">${al}</div>`:''}
      </div>
    </div>`;
  });
  document.getElementById('result-area').innerHTML = html;
}

// ===== MODAL =====
function showModal(gStr) {
  const g = typeof gStr === 'string' ? JSON.parse(gStr.replace(/&quot;/g,'"')) : gStr;
  S.pickedGift = g;
  const al = expiryAlert(g);
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-imgs">
      <div class="modal-img">${g.photo1?`<img src="${g.photo1}" onerror="this.parentNode.innerHTML='外観写真'">`:'外観写真'}</div>
      <div class="modal-img">${g.photo2?`<img src="${g.photo2}" onerror="this.parentNode.innerHTML='中身写真'">`:'中身写真'}</div>
    </div>
    <div class="modal-name">${g.name}</div>
    <div class="modal-shop">${g.shop}（${g.loc}）</div>
    <div class="modal-row"><span class="modal-lbl">内容</span><span class="modal-val">${g.detail||'—'}</span></div>
    <div class="modal-row"><span class="modal-lbl">価格（税込）</span><span class="modal-val">${g.price?'¥'+g.price.toLocaleString():'要確認'}</span></div>
    <div class="modal-row"><span class="modal-lbl">要冷蔵</span><span class="modal-val ${g.cold?'warn':''}">${g.cold?'要冷蔵':'不要'}</span></div>
    <div class="modal-row"><span class="modal-lbl">賞味期限目安</span><span class="modal-val ${al?'danger':''}">約${g.expiry||'—'}日${al?' ⚠':''}</span></div>
    ${g.season?`<div class="modal-row"><span class="modal-lbl">季節限定</span><span class="modal-val badge-season">${g.season}</span></div>`:''}
    <div class="modal-row"><span class="modal-lbl">備考</span><span class="modal-val">${g.note||'—'}</span></div>
    <div class="modal-row"><span class="modal-lbl">おすすめ理由</span><span class="modal-val">${g.reason||'—'}</span></div>
    ${S.delivery?`<div class="modal-row"><span class="modal-lbl">配送先</span><span class="modal-val">${S.deliveryTo||'—'}${S.deliveryAddr?' / '+S.deliveryAddr:''}</span></div>`:''}
    <button class="order-btn" onclick="showOrder()">手土産発注 ↗</button>
    <button class="modal-close" onclick="closeModalDirect()">閉じる</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('open'); }

// ===== ORDER =====
function showOrder() {
  S.orderSent = false;
  S.orderMethod = 'メール';
  renderOrderSheet();
  document.getElementById('order-overlay').classList.add('open');
}
function closeOrder(e) { if (e.target === document.getElementById('order-overlay')) document.getElementById('order-overlay').classList.remove('open'); }

function renderOrderSheet() {
  const g = S.pickedGift;
  if (S.orderSent) {
    document.getElementById('order-content').innerHTML = `
      <div class="modal-handle"></div>
      <div class="sent-wrap">
        <div class="sent-icon">✓</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">発注・履歴記録完了</div>
        <div style="font-size:14px;color:#8e8e93;line-height:1.7">履歴に記録しました。</div>
        <button class="save-btn" style="margin-top:24px" onclick="document.getElementById('order-overlay').classList.remove('open');document.getElementById('modal-overlay').classList.remove('open')">閉じる</button>
      </div>`;
    return;
  }

  // 過去のお渡し先候補を取得
  const pastCompanies = [...new Set(S.historyData.map(h=>h.company))].filter(Boolean);

  const summary = `【手土産発注】\nお渡し先：${S.orderCompany||'未入力'}\n商品：${g.name}\n店舗：${g.shop}（${g.loc}）\n価格：¥${g.price?g.price.toLocaleString():'要確認'}\n発注者：${S.person}（${S.dept}）\n目的：${S.purpose}\n人数：${S.headcount}\n渡す日：${S.date||'未定'}\n${S.delivery?`配送先：${S.deliveryTo}`:'持参'}`;

  document.getElementById('order-content').innerHTML = `
    <div class="modal-handle"></div>
    <div class="order-title">手土産発注・履歴記録</div>
    <div class="order-sub">お渡し先を入力して記録してください</div>

    <div class="lbl" style="margin-bottom:6px">お渡し先の会社名</div>
    <input type="text" id="order-company" placeholder="例：丸紅不動産" value="${S.orderCompany||''}"
      oninput="S.orderCompany=this.value;updateOrderBtn()" onblur="updateCompanyList()"
      style="margin-bottom:6px;font-size:14px;padding:10px 12px;border-radius:10px;border:1px solid #d1d1d6;width:100%">
    ${pastCompanies.length > 0 ? `
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:#8e8e93;margin-bottom:5px">過去のお渡し先：</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px" id="company-suggestions">
        ${pastCompanies.map(c=>`<div style="font-size:12px;padding:4px 10px;border-radius:14px;border:1px solid #d1d1d6;cursor:pointer;background:#fff" onclick="selectCompany('${c}')">${c}</div>`).join('')}
      </div>
    </div>` : ''}

    <div class="order-summary" style="margin-bottom:12px">
      商品：<span>${g.name}</span><br>
      店舗：<span>${g.shop}（${g.loc}）</span><br>
      価格：<span>¥${g.price?g.price.toLocaleString():'要確認'}</span><br>
      発注者：<span>${S.person}（${S.dept}）</span><br>
      目的：<span>${S.purpose}</span><br>
      人数：<span>${S.headcount}</span><br>
      渡す日：<span>${S.date||'未定'}</span><br>
      ${S.delivery?`配送先：<span>${S.deliveryTo||'—'}</span>`:'持参'}
    </div>

    <button class="send-execute" id="record-btn" onclick="sendOrder()" ${!S.orderCompany?'disabled style="opacity:0.35"':''}>
      履歴に記録する ↗
    </button>
    <button class="order-back" style="margin-top:8px;width:100%;padding:12px;font-size:14px;border-radius:14px;border:1px solid #d1d1d6;background:none;color:#8e8e93;cursor:pointer" onclick="document.getElementById('order-overlay').classList.remove('open')">戻る</button>
  `;
}

function selectCompany(c) {
  S.orderCompany = c;
  renderOrderSheet();
}

function updateCompanySuggestions() {
  // 入力中は再描画しない
}
function updateCompanyList() {
  // フォーカスが外れたときだけ候補リストを更新
  const el = document.getElementById('company-suggestions');
  if (!el) return;
  const q = S.orderCompany.toLowerCase();
  const pastCompanies = [...new Set(S.historyData.map(h=>h.company))].filter(Boolean);
  const filtered = q ? pastCompanies.filter(c=>c.includes(S.orderCompany)) : pastCompanies;
  el.innerHTML = filtered.map(c=>`<div style="font-size:12px;padding:4px 10px;border-radius:14px;border:1px solid #d1d1d6;cursor:pointer;background:#fff" onclick="selectCompany('${c}')">${c}</div>`).join('');
}
function updateOrderBtn() {
  const btn = document.querySelector('.send-execute');
  if (btn) {
    btn.disabled = !S.orderCompany;
    btn.style.opacity = S.orderCompany ? '1' : '0.35';
  }
}

function selectOrderMethod(m) { S.orderMethod=m; renderOrderSheet(); }

async function sendOrder() {
  const g = S.pickedGift;
  if (!S.orderCompany) return;
  const btn = document.getElementById('record-btn');
  if (btn) { btn.disabled = true; btn.textContent = '記録中...'; }

  // 履歴データをローカルに追加
  const today = new Date();
  const dateStr = (today.getMonth()+1) + '/' + today.getDate();
  const newRecord = {
    company: S.orderCompany,
    date: S.date ? S.date.slice(5).replace('-','/') : dateStr,
    name: g.name,
    detail: g.shop + '｜' + (g.detail||'') + '｜¥' + (g.price?g.price.toLocaleString():'要確認'),
    person: S.person,
    purpose: S.purpose,
    delivery: S.delivery,
  };
  S.historyData.unshift(newRecord);

  // Googleスプレッドシートに書き込む
  try {
    const row = [
      S.orderCompany,
      g.name,
      g.shop,
      g.detail||'',
      g.price||'',
      S.person + '（' + S.dept + '）',
      S.purpose,
      S.headcount,
      S.date||'',
      S.delivery ? '配送' : '持参',
      S.deliveryTo||'',
      new Date().toLocaleDateString('ja-JP'),
    ];
    await fetch(SHEETS_URL + '?action=addHistory&data=' + encodeURIComponent(JSON.stringify(row)));
  } catch(e) {
    console.log('履歴書き込みエラー:', e);
  }

  S.orderSent = true;
  renderOrderSheet();
  renderHistoryFilters();
}

// ===== HISTORY =====
function renderHistoryFilters() {
  const companies = ['すべて', ...new Set(S.historyData.map(h=>h.company))];
  const el = document.getElementById('history-filters');
  el.innerHTML = companies.map(c =>
    `<div class="filter-chip ${S.hFilter===c?'on':''}" onclick="selectHFilter('${c}')">${c}</div>`
  ).join('');
}
function selectHFilter(c) { S.hFilter=c; renderHistoryFilters(); renderHistory(); }

function renderHistory() {
  const q = (document.getElementById('history-search')?.value||'').trim();
  let filtered = S.historyData;
  if (q) filtered = filtered.filter(h=>h.company.includes(q)||h.name.includes(q)||h.person.includes(q));
  if (S.hFilter!=='すべて') filtered = filtered.filter(h=>h.company===S.hFilter);
  const grouped = {};
  filtered.forEach(h=>{ if(!grouped[h.company]) grouped[h.company]=[]; grouped[h.company].push(h); });
  const el = document.getElementById('history-content');
  if (!Object.keys(grouped).length) { el.innerHTML='<div class="no-result">該当する履歴がありません</div>'; return; }
  el.innerHTML = Object.entries(grouped).map(([company,items])=>`
    <div class="company-block">
      <div class="company-hd">
        <span class="company-name">${company}</span>
        <span class="company-count">${items.length}件</span>
      </div>
      ${items.map(h=>`
        <div class="h-item">
          <div class="h-date">${h.date}</div>
          <div class="h-body">
            <div class="h-name">${h.name}</div>
            <div class="h-detail">${h.detail}</div>
            <div class="h-footer">
              <span class="h-person">${h.person}</span>
              <div class="badges">
                <span class="badge ${h.purpose==='謝罪'?'badge-warn':''}">${h.purpose}</span>
                ${h.delivery?'<span class="badge">配送</span>':''}
              </div>
            </div>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

// ===== ADD/DELETE =====
function renderCatFilters() {
  const cats = ['すべて','洋菓子','和菓子','チョコレート','カステラ','最中','食品'];
  const el = document.getElementById('cat-filters');
  el.innerHTML = cats.map(c =>
    `<div class="filter-chip ${S.catFilter===c?'on':''}" onclick="selectCatFilter('${c}')">${c}</div>`
  ).join('');
}
function selectCatFilter(c) { S.catFilter=c; renderCatFilters(); renderGiftList(); }

function renderGiftCount() {
  const el = document.getElementById('gift-count');
  if (el) el.textContent = `登録商品 ${S.gifts.length}件`;
}

function renderGiftList() {
  const q = (document.getElementById('gift-search')?.value||'').trim();
  let filtered = S.gifts;
  if (q) filtered = filtered.filter(g=>g.shop.includes(q)||g.name.includes(q));
  if (S.catFilter!=='すべて') filtered = filtered.filter(g=>g.cat===S.catFilter);

  document.getElementById('gift-count').textContent = `登録商品 ${S.gifts.length}件`;

  const delArea = document.getElementById('del-confirm-area');
  if (S.deleteTarget!==null) {
    const g = S.gifts.find(x=>x.id==S.deleteTarget);
    delArea.innerHTML = g ? `
      <div class="del-confirm">
        <div class="del-confirm-txt">「${g.name}」を削除しますか？<br>この操作は取り消せません。</div>
        <div class="del-btns">
          <button class="del-yes" onclick="confirmDelete()">削除する</button>
          <button class="del-no" onclick="S.deleteTarget=null;renderGiftList()">キャンセル</button>
        </div>
      </div>` : '';
  } else { delArea.innerHTML = ''; }

  const el = document.getElementById('gift-list');
  if (!filtered.length) { el.innerHTML='<div class="no-result">該当する商品がありません</div>'; return; }
  el.innerHTML = filtered.map(g=>`
    <div class="gift-list-item">
      <div class="gift-thumb">${g.photo1?`<img src="${g.photo1}" onerror="this.parentNode.innerHTML='写真'">`:'写真'}</div>
      <div class="gift-info">
        <div class="gift-list-name">${g.name}${g.season?`<span class="badge badge-season" style="margin-left:5px;font-size:10px">${g.season}</span>`:''}</div>
        <div class="gift-list-sub">${g.shop}｜${g.cat}${g.price?'｜¥'+g.price.toLocaleString():''}</div>
      </div>
      <button class="del-btn" onclick="S.deleteTarget=${g.id};renderGiftList()">削除</button>
    </div>`).join('');
}

function confirmDelete() {
  S.gifts = S.gifts.filter(g=>g.id!=S.deleteTarget);
  S.deleteTarget = null;
  renderGiftList();
}

function showAddForm() {
  document.getElementById('add-list-view').style.display = 'none';
  document.getElementById('add-form-view').style.display = 'block';
  showAddStep1();
}
function showListView() {
  document.getElementById('add-list-view').style.display = 'block';
  document.getElementById('add-form-view').style.display = 'none';
  renderGiftList();
}
function showAddStep1() {
  document.getElementById('add-step-1').style.display = 'block';
  document.getElementById('add-step-2').style.display = 'none';
  document.getElementById('add-step-done').style.display = 'none';
}
function showAddStep1Again() {
  S.photo1=null; S.photo2=null; S.addPurposes=[]; S.addSeason=null;
  ['photo-slot-1','photo-slot-2'].forEach((id,i)=>{
    const s=document.getElementById(id);
    if(s){s.className='photo-slot';s.style.backgroundImage='';}
  });
  const ic1=document.getElementById('photo-icon-1');
  const ic2=document.getElementById('photo-icon-2');
  const lb1=document.getElementById('photo-label-1');
  const lb2=document.getElementById('photo-label-2');
  if(ic1)ic1.textContent='📷';
  if(ic2)ic2.textContent='📷';
  if(lb1)lb1.textContent='外観写真を追加';
  if(lb2)lb2.textContent='中身写真を追加';
  document.getElementById('add-name').value='';
  document.getElementById('add-shop').value='';
  document.getElementById('add-loc').value='';
  document.getElementById('add-price').value='';
  document.getElementById('add-expiry').value='';
  document.getElementById('add-note').value='';
  renderAddPurposeChips();
  renderSeasonChipsAdd();
  showAddStep1();
}
function showAddStep2() {
  document.getElementById('add-step-1').style.display = 'none';
  document.getElementById('add-step-2').style.display = 'block';
  document.getElementById('add-step-done').style.display = 'none';
}
function handlePhoto(n, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    if (n === 1) { S.photo1 = dataUrl; }
    else { S.photo2 = dataUrl; }
    const slot = document.getElementById(`photo-slot-${n}`);
    slot.className = 'photo-slot filled';
    slot.style.backgroundImage = `url(${dataUrl})`;
    slot.style.backgroundSize = 'cover';
    slot.style.backgroundPosition = 'center';
    document.getElementById(`photo-icon-${n}`).textContent = '✓';
    document.getElementById(`photo-label-${n}`).textContent = n===1?'外観写真　登録済み':'中身写真　登録済み';
  };
  reader.readAsDataURL(file);
}
function togglePhoto(n) {}
function saveGift() {
  const newId = S.gifts.length ? Math.max(...S.gifts.map(g=>Number(g.id)||0))+1 : 1;
  S.gifts.push({
    id: newId,
    name: document.getElementById('add-name').value || '新規商品',
    shop: document.getElementById('add-shop').value,
    loc: document.getElementById('add-loc').value,
    cat: document.getElementById('add-cat').value,
    price: document.getElementById('add-price').value ? Number(document.getElementById('add-price').value.replace(/,/g,'')) : null,
    detail: '',
    purpose: [...S.addPurposes],
    note: document.getElementById('add-note').value,
    cold: document.getElementById('add-cold').value === '要冷蔵',
    season: S.addSeason,
    expiry: document.getElementById('add-expiry').value ? Number(document.getElementById('add-expiry').value) : null,
    photo1: S.photo1||null, photo2: S.photo2||null,
  });
  document.getElementById('add-step-2').style.display = 'none';
  document.getElementById('add-step-done').style.display = 'block';
}

function renderAddPurposeChips() {
  const el = document.getElementById('purpose-chips-add');
  el.innerHTML = ['会食','訪問','御礼','謝罪'].map(v =>
    `<div class="chip ${S.addPurposes.includes(v)?'on':''}" onclick="toggleAddPurpose('${v}')">${v}</div>`
  ).join('');
}
function toggleAddPurpose(v) {
  const i = S.addPurposes.indexOf(v);
  if (i>=0) S.addPurposes.splice(i,1); else S.addPurposes.push(v);
  renderAddPurposeChips();
}
function renderSeasonChipsAdd() {
  const el = document.getElementById('season-chips-add');
  el.innerHTML = ['なし','春限定','夏限定','秋限定','冬限定'].map(v =>
    `<div class="chip ${(S.addSeason===v||(v==='なし'&&!S.addSeason))?'on':''}" onclick="selectSeason('${v}')">${v}</div>`
  ).join('');
}
function selectSeason(v) {
  S.addSeason = v==='なし' ? null : v;
  renderSeasonChipsAdd();
}
</script>
