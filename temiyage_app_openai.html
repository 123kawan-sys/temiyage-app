<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="手土産アプリ">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>手土産アプリ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f7; color: #1c1c1e; max-width: 480px; margin: 0 auto; min-height: 100vh; }
.nav { display: flex; background: #fff; border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; z-index: 100; }
.nav-btn { flex: 1; padding: 12px 4px 10px; font-size: 11px; font-weight: 600; border: none; background: none; color: #8e8e93; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.nav-btn.active { color: #1c1c1e; border-bottom-color: #1c1c1e; }
.page { display: none; padding: 16px; }
.page.active { display: block; }
.section { margin-bottom: 18px; }
.lbl { font-size: 11px; font-weight: 600; color: #8e8e93; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 7px; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip { font-size: 13px; padding: 6px 13px; border-radius: 20px; border: 1px solid #d1d1d6; color: #8e8e93; background: #fff; cursor: pointer; transition: all 0.12s; user-select: none; }
.chip.on { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }
.tab-row { display: flex; gap: 6px; margin-bottom: 10px; }
.tab { font-size: 13px; font-weight: 600; padding: 6px 18px; border-radius: 20px; border: 1px solid #d1d1d6; color: #8e8e93; cursor: pointer; }
.tab.on { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }
input[type=text], input[type=date], input[type=number], select, textarea { width: 100%; font-size: 14px; padding: 10px 12px; border-radius: 10px; border: 1px solid #d1d1d6; background: #fff; color: #1c1c1e; -webkit-appearance: none; appearance: none; }
.delivery-box { background: #f2f2f7; border-radius: 12px; padding: 12px; margin-top: 8px; }
.delivery-box .lbl { margin-bottom: 8px; }
.delivery-box input { margin-top: 8px; }
.go-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 14px; border: none; background: #1c1c1e; color: #fff; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
.go-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.divider { border: none; border-top: 1px solid #e5e5ea; margin: 6px 0 16px; }
.loading { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 2px solid #e5e5ea; border-top-color: #1c1c1e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #fff0f0; border-radius: 12px; padding: 14px; text-align: center; font-size: 13px; color: #c0392b; }
.result-header { font-size: 13px; font-weight: 600; color: #8e8e93; margin-bottom: 12px; }
.gift-card { background: #fff; border-radius: 16px; border: 1px solid #e5e5ea; overflow: hidden; margin-bottom: 12px; cursor: pointer; transition: transform 0.1s; }
.gift-card:active { transform: scale(0.98); }
.gift-img-wrap { width: 100%; height: 140px; background: #f2f2f7; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #8e8e93; overflow: hidden; }
.gift-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.gift-body { padding: 12px 14px; }
.gift-name { font-size: 14px; font-weight: 700; color: #1c1c1e; margin-bottom: 3px; }
.gift-shop { font-size: 12px; color: #8e8e93; margin-bottom: 6px; }
.gift-foot { display: flex; justify-content: space-between; align-items: center; }
.gift-price { font-size: 15px; font-weight: 700; color: #1c1c1e; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: #e8f4fd; color: #1a73e8; }
.badge-warn { background: #fff3cd; color: #856404; }
.badge-danger { background: #fde8e8; color: #c0392b; }
.badge-season { background: #e8f5e9; color: #2e7d32; }
.gift-reason { font-size: 12px; color: #8e8e93; margin-top: 6px; line-height: 1.5; }
.expiry-alert { font-size: 11px; color: #c0392b; margin-top: 4px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 16px; }
.modal-handle { width: 36px; height: 4px; background: #d1d1d6; border-radius: 2px; margin: 0 auto 14px; }
.modal-img-wrap { width: 100%; height: 180px; background: #f2f2f7; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #8e8e93; overflow: hidden; margin-bottom: 14px; }
.modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
.modal-name { font-size: 18px; font-weight: 700; color: #1c1c1e; margin-bottom: 2px; }
.modal-shop { font-size: 13px; color: #8e8e93; margin-bottom: 12px; }
.modal-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #f2f2f7; font-size: 13px; }
.modal-lbl { color: #8e8e93; }
.modal-val { color: #1c1c1e; font-weight: 600; text-align: right; max-width: 60%; line-height: 1.5; }
.modal-val.warn { color: #856404; }
.modal-val.danger { color: #c0392b; }
.order-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 14px; border: none; background: #1c1c1e; color: #fff; cursor: pointer; margin-top: 14px; }
.modal-close { width: 100%; padding: 12px; font-size: 14px; border-radius: 14px; border: 1px solid #d1d1d6; background: none; color: #8e8e93; cursor: pointer; margin-top: 8px; }
.order-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: flex-end; justify-content: center; }
.order-overlay.open { display: flex; }
.order-sheet { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 16px; }
.order-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.order-sub { font-size: 13px; color: #8e8e93; margin-bottom: 14px; }
.order-summary { background: #f2f2f7; border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: #8e8e93; line-height: 2.1; }
.order-summary span { color: #1c1c1e; font-weight: 600; }
.send-execute { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 14px; border: none; background: #1c1c1e; color: #fff; cursor: pointer; }
.sent-wrap { text-align: center; padding: 30px 16px; }
.sent-icon { width: 56px; height: 56px; border-radius: 50%; background: #e8f5e9; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 26px; }
.search-box-wrap { position: relative; margin-bottom: 10px; }
.search-box { width: 100%; font-size: 14px; padding: 10px 12px; border-radius: 12px; border: 1px solid #d1d1d6; background: #f2f2f7; color: #1c1c1e; }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #8e8e93; pointer-events: none; }
.filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; }
.filter-row::-webkit-scrollbar { display: none; }
.company-block { margin-bottom: 16px; }
.company-hd { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 6px; border-bottom: 1px solid #e5e5ea; margin-bottom: 8px; }
.company-name { font-size: 14px; font-weight: 700; }
.company-count { font-size: 11px; color: #8e8e93; }
.h-item { display: flex; gap: 10px; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #f2f2f7; }
.h-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.h-date { font-size: 11px; color: #8e8e93; min-width: 40px; padding-top: 2px; }
.h-body { flex: 1; }
.h-name { font-size: 13px; font-weight: 700; color: #1c1c1e; margin-bottom: 2px; }
.h-detail { font-size: 11px; color: #8e8e93; line-height: 1.5; margin-bottom: 3px; }
.h-footer { display: flex; justify-content: space-between; align-items: center; }
.h-person { font-size: 11px; color: #8e8e93; }
.no-result { text-align: center; padding: 40px 0; font-size: 14px; color: #8e8e93; }
.qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.qty-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #d1d1d6; background: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.qty-num { font-size: 20px; font-weight: 700; min-width: 32px; text-align: center; }
</style>
</head>
<body>

<div style="background:#1c1c1e;padding:12px 16px 10px;text-align:center">
  <span style="color:#fff;font-size:16px;font-weight:700;letter-spacing:0.05em">手土産アプリ</span>
</div>
<div class="nav">
  <button class="nav-btn active" onclick="showPage('search')">候補検索</button>
  <button class="nav-btn" onclick="showPage('history')">履歴</button>
</div>

<div id="page-search" class="page active">
  <div class="section">
    <div class="lbl">発注者</div>
    <div class="tab-row" id="dept-tabs"></div>
    <div class="chips" id="member-chips"></div>
  </div>
  <hr class="divider">
  <div class="section">
    <div class="lbl">訪問目的</div>
    <div class="chips" id="purpose-chips"></div>
  </div>
  <div class="section">
    <div class="lbl">相手の役職</div>
    <div class="chips" id="role-chips"></div>
  </div>
  <div class="section">
    <div class="lbl">相手の所在地</div>
    <div class="chips" id="region-chips"></div>
  </div>
  <hr class="divider">
  <div class="section">
    <div class="lbl">渡す日</div>
    <div style="position:relative;display:inline-block;width:100%">
      <div id="date-btn" onclick="document.getElementById('date-input').focus()"
        style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;border:1px solid #d1d1d6;background:#fff;cursor:pointer">
        <span id="date-display-text" style="font-size:14px;color:#8e8e93">タップして日付を選ぶ</span>
        <span id="date-clear" style="display:none;font-size:18px;color:#8e8e93" onclick="event.stopPropagation();clearDate()">×</span>
      </div>
      <input type="date" id="date-input" onchange="setDate(this.value)"
        style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:1">
    </div>
  </div>
  <div class="section">
    <div class="lbl">予算レンジ</div>
    <div class="chips" id="budget-chips"></div>
  </div>
  <div class="section">
    <div class="lbl">持参 or 配送</div>
    <div class="chips" id="delivery-chips"></div>
    <div id="delivery-box" style="display:none">
      <div class="delivery-box">
        <div class="lbl">送り先</div>
        <div class="chips" id="delivery-to-chips"></div>
        <input type="text" id="delivery-addr" placeholder="住所を入力（任意）" style="margin-top:8px">
      </div>
    </div>
  </div>
  <button class="go-btn" id="go-btn" disabled onclick="generateCandidates()">条件をすべて選んでください</button>
  <div id="result-area" style="margin-top:20px"></div>
</div>

<div id="page-history" class="page">
  <div class="search-box-wrap">
    <input type="text" class="search-box" id="history-search" placeholder="🔍 社名・商品名・担当者で検索" oninput="renderHistory()">
  </div>
  <div class="filter-row" id="history-filters"></div>
  <div id="history-content"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div class="order-overlay" id="order-overlay" onclick="closeOrder(event)">
  <div class="order-sheet" id="order-content"></div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxcEXLzjVzCymWNmBHxSsDPHBeloFqVpZMeQQwKe69YeBO5mkWiB4Mata5p_ppHvaZofQ/exec';

const DEPTS = {
  'BR': ['久積','河埜','宮原','廣野','佐藤','牧田','窪田','久保','社長'],
  'PM': ['小島','森崎','中村聖','鳥海','矢島','奥村','宮園','下田','栗林','村田','空閑','中村美','萩原','西山','池田','藤田'],
};

const S = {
  dept:'BR', person:null, purpose:null, role:null, region:null,
  date:'', budgetMin:0, budgetMax:99999, budgetLabel:'指定なし',
  delivery:false, deliveryTo:'', deliveryAddr:'',
  hFilter:'すべて',
  pickedGift:null, orderSent:false, orderCompany:'', orderQty:1,
  gifts:[], historyData:[],
};

window.onload = async () => {
  renderDeptTabs();
  renderMemberChips();
  renderPurposeChips();
  renderRoleChips();
  renderRegionChips();
  renderDeliveryChips();
  renderBudgetChips();
  renderHistoryFilters();
  await loadGiftsFromSheets();
};

async function loadGiftsFromSheets() {
  try {
    const res = await fetch(SHEETS_URL, { redirect: 'follow' });
    const data = await res.json();
    try {
      const hres = await fetch(SHEETS_URL + '?sheet=履歴', { redirect: 'follow' });
      const hdata = await hres.json();
      if (Array.isArray(hdata)) {
        S.historyData = hdata.map(r => ({
          company: r['お渡し先'] || '',
          date: r['日付'] || r['渡す日'] || '',
          name: r['商品名'] || '',
          detail: (r['店舗名']||'') + '｜' + (r['内容']||'') + '｜¥' + (r['価格']||''),
          person: r['発注者'] || '',
          purpose: r['目的'] || '',
          delivery: r['持参配送'] === '配送',
        })).filter(r => r.company);
      }
    } catch(e2) {}
    if (Array.isArray(data) && data.length > 0) {
      S.gifts = data.map((row, i) => ({
        id: row['ID'] || i+1,
        name: row['商品名'] || '',
        shop: row['店舗名'] || '',
        loc: row['購入場所'] || '',
        cat: row['カテゴリ'] || '',
        price: row['価格（税込）'] ? Number(row['価格（税込）']) : null,
        detail: row['内容・個数'] || '',
        purpose: row['訪問目的'] ? row['訪問目的'].split(',').map(s=>s.trim()) : [],
        note: row['備考'] || '',
        cold: row['要冷蔵'] === '〇' || row['要冷蔵'] === '要冷蔵',
        season: row['季節限定'] || null,
        expiry: row['賞味期限（日数）'] ? Number(row['賞味期限（日数）']) : null,
        photo1: row['写真URL'] || null,
      })).filter(g => g.name);
    }
  } catch(e) { console.log('シート読み込みエラー:', e); }
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const idx = {'search':0,'history':1}[page];
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (page === 'history') renderHistory();
}

function renderDeptTabs() {
  const el = document.getElementById('dept-tabs');
  el.innerHTML = Object.keys(DEPTS).map(d =>
    `<div class="tab ${S.dept===d?'on':''}" onclick="selectDept('${d}')">${d}</div>`
  ).join('');
}
function selectDept(d) { S.dept=d; S.person=null; renderDeptTabs(); renderMemberChips(); updateGoBtn(); }

function renderMemberChips() {
  const el = document.getElementById('member-chips');
  el.innerHTML = DEPTS[S.dept].map(m =>
    `<div class="chip ${S.person===m?'on':''}" onclick="selectMember('${m}')">${m}</div>`
  ).join('');
}
function selectMember(m) { S.person=m; renderMemberChips(); updateGoBtn(); }

function renderPurposeChips() {
  const el = document.getElementById('purpose-chips');
  el.innerHTML = ['会食','訪問','御礼','謝罪'].map(v =>
    `<div class="chip ${S.purpose===v?'on':''}" onclick="selectPurpose('${v}')">${v}</div>`
  ).join('');
}
function selectPurpose(v) { S.purpose=v; renderPurposeChips(); updateGoBtn(); }

function renderRoleChips() {
  const el = document.getElementById('role-chips');
  el.innerHTML = ['担当者','部長・課長','役員・社長'].map(v =>
    `<div class="chip ${S.role===v?'on':''}" onclick="selectRole('${v}')">${v}</div>`
  ).join('');
}
function selectRole(v) { S.role=v; renderRoleChips(); updateGoBtn(); }

function renderRegionChips() {
  const el = document.getElementById('region-chips');
  el.innerHTML = ['福岡（地元）','九州内','県外'].map(v =>
    `<div class="chip ${S.region===v?'on':''}" onclick="selectRegion('${v}')">${v}</div>`
  ).join('');
}
function selectRegion(v) { S.region=v; renderRegionChips(); updateGoBtn(); }

function setDate(v) {
  S.date = v;
  if (v) {
    const d = new Date(v + 'T00:00:00');
    document.getElementById('date-display-text').textContent = (d.getMonth()+1) + '月' + d.getDate() + '日';
    document.getElementById('date-display-text').style.color = '#1c1c1e';
    document.getElementById('date-clear').style.display = 'inline';
  }
}
function clearDate() {
  S.date = '';
  document.getElementById('date-input').value = '';
  document.getElementById('date-display-text').textContent = 'タップして日付を選ぶ';
  document.getElementById('date-display-text').style.color = '#8e8e93';
  document.getElementById('date-clear').style.display = 'none';
}

const BUDGET_OPTIONS = [
  {label:'指定なし', min:0, max:99999},
  {label:'〜¥3,000', min:0, max:3000},
  {label:'¥3,000〜¥5,000', min:3000, max:5000},
  {label:'¥5,000〜¥10,000', min:5000, max:10000},
  {label:'¥10,000〜¥15,000', min:10000, max:15000},
];
function renderBudgetChips() {
  const el = document.getElementById('budget-chips');
  if (!el) return;
  el.innerHTML = BUDGET_OPTIONS.map(o =>
    `<div class="chip ${S.budgetLabel===o.label?'on':''}" onclick="selectBudget('${o.label}',${o.min},${o.max})">${o.label}</div>`
  ).join('');
}
function selectBudget(label, min, max) {
  S.budgetLabel=label; S.budgetMin=min; S.budgetMax=max;
  renderBudgetChips(); updateGoBtn();
}

function renderDeliveryChips() {
  const el = document.getElementById('delivery-chips');
  el.innerHTML = ['持参','配送'].map(v => {
    const on = (v==='配送' && S.delivery) || (v==='持参' && !S.delivery);
    return `<div class="chip ${on?'on':''}" onclick="selectDelivery('${v}')">${v}</div>`;
  }).join('');
  document.getElementById('delivery-box').style.display = S.delivery ? 'block' : 'none';
}
function selectDelivery(v) {
  S.delivery = (v==='配送');
  renderDeliveryChips();
  if (S.delivery) {
    const el = document.getElementById('delivery-to-chips');
    el.innerHTML = ['先方オフィス','ホテル','自宅'].map(t =>
      `<div class="chip ${S.deliveryTo===t?'on':''}" onclick="selectDeliveryTo('${t}')">${t}</div>`
    ).join('');
  }
}
function selectDeliveryTo(v) {
  S.deliveryTo = v;
  document.getElementById('delivery-to-chips').querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c.textContent===v));
}

function updateGoBtn() {
  const btn = document.getElementById('go-btn');
  const ok = S.person && S.purpose && S.role && S.region;
  btn.disabled = !ok;
  btn.textContent = ok ? `${S.person}さんの候補を生成 ↗` : '条件をすべて選んでください';
}

function daysLeft() {
  if (!S.date) return null;
  return Math.round((new Date(S.date) - new Date()) / 86400000);
}
function expiryAlert(g) {
  const d = daysLeft();
  if (d !== null && g.expiry && d > g.expiry) return `渡す日まで${d}日。賞味期限（約${g.expiry}日）に注意`;
  return null;
}

async function generateCandidates() {
  const resultArea = document.getElementById('result-area');
  const btn = document.getElementById('go-btn');
  btn.disabled = true;
  btn.textContent = '生成中...';
  resultArea.innerHTML = '<div class="loading"><div class="spinner"></div>AIが候補を選定しています...</div>';

  const dl = daysLeft();
  const filtered = S.gifts.filter(g => {
    if (S.budgetLabel === '指定なし') return true;
    if (g.price && g.price > S.budgetMax) return false;
    if (S.budgetMin > 0 && g.price && g.price < S.budgetMin) return false;
    return true;
  });

  const regionCtx = {
    '福岡（地元）': '相手は福岡在住のため定番品は避け特別感のある品を優先。',
    '九州内': '相手は九州内在住のため福岡銘品で現地入手困難なものが喜ばれる。',
    '県外': '相手は県外在住のため福岡らしさが伝わる名品を優先。',
  }[S.region] || '';

  const giftList = filtered.map(g => ({
    id: g.id, name: g.name, shop: g.shop,
    price: g.price, cat: g.cat,
    purpose: g.purpose, cold: g.cold,
    expiry: g.expiry, season: g.season
  }));

  const prompt = `手土産選定。条件:発注者${S.person}(${S.dept}),目的${S.purpose},役職${S.role},所在地${S.region},日付${S.date||'未定'},予算${S.budgetLabel},${S.delivery?'配送:'+S.deliveryTo:'持参'},${regionCtx}。リスト:${JSON.stringify(giftList)}。最適3〜5点をJSON形式のみで返答:[{"id":数値,"reason":"理由40字以内","tag":"定番/格上げ/季節感/話題性"}]【重要】予算レンジ外の商品は絶対に選ばないこと。reasonは商品名・店舗名・内容から読み取れる実際の特徴のみ書くこと。店舗の歴史・産地など確認できない情報は書かないこと`;

  try {
    const res = await fetch(SHEETS_URL + '?action=ai&prompt=' + encodeURIComponent(prompt.substring(0, 1500)), {
      redirect: 'follow'
    });
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const content = data.choices[0].message.content;
    const picks = JSON.parse(content.replace(/```json|```/g,'').trim());
    const results = picks.map(p => ({...S.gifts.find(g=>g.id==p.id), reason:p.reason, tag:p.tag})).filter(Boolean);
    renderResults(results);
  } catch(e) {
    resultArea.innerHTML = `<div class="error-box">エラー：${e.message||'生成に失敗しました'}</div>`;
  }
  btn.disabled = false;
  btn.textContent = `${S.person}さんの候補を生成 ↗`;
}

function renderResults(gifts) {
  let html = `<div class="result-header">おすすめ候補 ${gifts.length}件（タップで詳細）</div>`;
  gifts.forEach(g => {
    const al = expiryAlert(g);
    html += `<div class="gift-card" onclick="showModal(${JSON.stringify(g).replace(/"/g,'&quot;')})">
      <div class="gift-img-wrap">
        ${g.photo1 ? `<img src="${g.photo1}" onerror="this.parentNode.innerHTML='写真なし'">` : '写真なし'}
      </div>
      <div class="gift-body">
        <div class="gift-name">${g.name}</div>
        <div class="gift-shop">${g.shop}（${g.loc}）</div>
        <div class="gift-foot">
          <span class="gift-price">${g.price?'¥'+g.price.toLocaleString():'要確認'}</span>
          <div class="badges">
            <span class="badge">${g.tag||g.cat}</span>
            ${g.cold?'<span class="badge badge-warn">要冷蔵</span>':''}
            ${g.season?`<span class="badge badge-season">${g.season}</span>`:''}
            ${al?'<span class="badge badge-danger">期限注意</span>':''}
          </div>
        </div>
        <div class="gift-reason">${g.reason||''}</div>
        ${al?`<div class="expiry-alert">${al}</div>`:''}
      </div>
    </div>`;
  });
  document.getElementById('result-area').innerHTML = html;
}

function showModal(gStr) {
  const g = typeof gStr === 'string' ? JSON.parse(gStr.replace(/&quot;/g,'"')) : gStr;
  S.pickedGift = g;
  const al = expiryAlert(g);
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-img-wrap">
      ${g.photo1 ? `<img src="${g.photo1}" onerror="this.parentNode.innerHTML='写真なし'">` : '写真なし'}
    </div>
    <div class="modal-name">${g.name}</div>
    <div class="modal-shop">${g.shop}（${g.loc}）</div>
    <div class="modal-row"><span class="modal-lbl">内容</span><span class="modal-val">${g.detail||'—'}</span></div>
    <div class="modal-row"><span class="modal-lbl">価格（税込）</span><span class="modal-val">${g.price?'¥'+g.price.toLocaleString():'要確認'}</span></div>
    <div class="modal-row"><span class="modal-lbl">要冷蔵</span><span class="modal-val ${g.cold?'warn':''}">${g.cold?'要冷蔵':'不要'}</span></div>
    <div class="modal-row"><span class="modal-lbl">賞味期限目安</span><span class="modal-val ${al?'danger':''}">約${g.expiry||'—'}日${al?' ⚠':''}</span></div>
    ${g.season?`<div class="modal-row"><span class="modal-lbl">季節限定</span><span class="modal-val">${g.season}</span></div>`:''}
    <div class="modal-row"><span class="modal-lbl">備考</span><span class="modal-val">${g.note||'—'}</span></div>
    <div class="modal-row"><span class="modal-lbl">おすすめ理由</span><span class="modal-val">${g.reason||'—'}</span></div>
    ${S.delivery?`<div class="modal-row"><span class="modal-lbl">配送先</span><span class="modal-val">${S.deliveryTo||'—'}${S.deliveryAddr?' / '+S.deliveryAddr:''}</span></div>`:''}
    <button class="order-btn" onclick="showOrder()">手土産発注 ↗</button>
    <button class="modal-close" onclick="closeModalDirect()">閉じる</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('open'); }

function showOrder() {
  S.orderSent = false;
  S.orderQty = 1;
  renderOrderSheet();
  document.getElementById('order-overlay').classList.add('open');
}
function closeOrder(e) { if (e.target === document.getElementById('order-overlay')) document.getElementById('order-overlay').classList.remove('open'); }

function changeQty(delta) {
  S.orderQty = Math.max(1, S.orderQty + delta);
  const el = document.getElementById('qty-display');
  if (el) el.textContent = S.orderQty;
  const sq = document.getElementById('summary-qty');
  if (sq) sq.textContent = S.orderQty + '個';
}

function renderOrderSheet() {
  const g = S.pickedGift;
  if (S.orderSent) {
    document.getElementById('order-content').innerHTML = `
      <div class="modal-handle"></div>
      <div class="sent-wrap">
        <div class="sent-icon">✓</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">発注・履歴記録完了</div>
        <div style="font-size:14px;color:#8e8e93;line-height:1.7">グループLINEに通知しました。</div>
        <button class="send-execute" style="margin-top:24px" onclick="document.getElementById('order-overlay').classList.remove('open');document.getElementById('modal-overlay').classList.remove('open')">閉じる</button>
      </div>`;
    return;
  }
  const pastCompanies = [...new Set(S.historyData.map(h=>h.company))].filter(Boolean);
  document.getElementById('order-content').innerHTML = `
    <div class="modal-handle"></div>
    <div class="order-title">手土産発注・履歴記録</div>
    <div class="order-sub">お渡し先を入力して記録してください</div>
    <div class="lbl" style="margin-bottom:6px">お渡し先の会社名</div>
    <input type="text" id="order-company" placeholder="例：丸紅不動産" value="${S.orderCompany||''}"
      oninput="S.orderCompany=this.value;updateOrderBtn();updateCompanyList()"
      style="margin-bottom:6px">
    <div id="company-suggestions-wrap" style="display:none;margin-bottom:12px">
      <div style="display:flex;flex-direction:column;gap:3px" id="company-suggestions"></div>
    </div>
    <div class="lbl" style="margin-bottom:8px">発注個数</div>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <span class="qty-num" id="qty-display">${S.orderQty}</span>
      <button class="qty-btn" onclick="changeQty(1)">＋</button>
      <span style="font-size:13px;color:#8e8e93">個</span>
    </div>
    <div class="order-summary">
      商品：<span>${g.name}</span><br>
      店舗：<span>${g.shop}（${g.loc}）</span><br>
      価格：<span>¥${g.price?g.price.toLocaleString():'要確認'}</span><br>
      個数：<span id="summary-qty">${S.orderQty}個</span><br>
      発注者：<span>${S.person}（${S.dept}）</span><br>
      目的：<span>${S.purpose}</span><br>
      渡す日：<span>${S.date||'未定'}</span><br>
      ${S.delivery?`配送先：<span>${S.deliveryTo||'—'}</span>`:'持参'}
    </div>
    <button class="send-execute" id="record-btn" onclick="sendOrder()" ${!S.orderCompany?'disabled style="opacity:0.35"':''}>
      発注し履歴に記録する ↗
    </button>
    <button style="margin-top:8px;width:100%;padding:12px;font-size:14px;border-radius:14px;border:1px solid #d1d1d6;background:none;color:#8e8e93;cursor:pointer" onclick="document.getElementById('order-overlay').classList.remove('open')">戻る</button>
  `;
}

function selectCompany(c) { S.orderCompany=c; document.getElementById('order-company').value=c; document.getElementById('company-suggestions').innerHTML=''; document.getElementById('company-suggestions-wrap').style.display='none'; updateOrderBtn(); }
function updateCompanyList() {
  const el = document.getElementById('company-suggestions');
  const wrap = document.getElementById('company-suggestions-wrap');
  if (!el || !wrap) return;
  const q = S.orderCompany.trim();
  if (!q) { wrap.style.display='none'; el.innerHTML=''; return; }
  const pastCompanies = [...new Set(S.historyData.map(h=>h.company))].filter(Boolean);
  const filtered = pastCompanies.filter(c=>c.includes(q));
  if (!filtered.length) { wrap.style.display='none'; el.innerHTML=''; return; }
  wrap.style.display='block';
  el.innerHTML = filtered.map(c=>`<div style="font-size:13px;padding:8px 12px;border-radius:10px;border:1px solid #e5e5ea;cursor:pointer;background:#fff" onclick="selectCompany('${c}')">${c}</div>`).join('');
}
function updateOrderBtn() {
  const btn = document.querySelector('.send-execute');
  if (btn) { btn.disabled=!S.orderCompany; btn.style.opacity=S.orderCompany?'1':'0.35'; }
}

async function sendOrder() {
  const g = S.pickedGift;
  if (!S.orderCompany) return;
  const btn = document.getElementById('record-btn');
  if (btn) { btn.disabled=true; btn.textContent='記録中...'; }

  const today = new Date();
  const dateStr = (today.getMonth()+1) + '/' + today.getDate();
  S.historyData.unshift({
    company: S.orderCompany,
    date: S.date ? S.date.slice(5).replace('-','/') : dateStr,
    name: g.name,
    detail: g.shop + '｜' + (g.detail||'') + '｜¥' + (g.price?g.price.toLocaleString():'要確認'),
    person: S.person,
    purpose: S.purpose,
    delivery: S.delivery,
  });

  try {
    const row = [
      S.orderCompany,                          // A: お渡し先
      g.name,                                  // B: 商品名
      S.orderQty,                              // C: 個数
      g.shop,                                  // D: 店舗名
      g.detail||'',                            // E: 内容
      g.price||'',                             // F: 価格
      S.person + '（' + S.dept + '）',         // G: 発注者
      S.purpose,                               // H: 目的
      S.date||'',                              // I: 渡す日
      S.delivery ? '配送' : '持参',            // J: 持参配送
      S.deliveryTo||'',                        // K: 配送先
      new Date().toLocaleDateString('ja-JP'),  // L: 記録日
    ];
    await fetch(SHEETS_URL + '?action=addHistory&data=' + encodeURIComponent(JSON.stringify(row)), {
      redirect: 'follow'
    });
  } catch(e) { console.log('履歴書き込みエラー:', e); }

  S.orderSent = true;
  renderOrderSheet();
  renderHistoryFilters();
}

function renderHistoryFilters() {
  const companies = ['すべて', ...new Set(S.historyData.map(h=>h.company))];
  const el = document.getElementById('history-filters');
  el.innerHTML = companies.map(c =>
    `<div class="filter-chip ${S.hFilter===c?'on':''}" onclick="selectHFilter('${c}')">${c}</div>`
  ).join('');
}
function selectHFilter(c) { S.hFilter=c; renderHistoryFilters(); renderHistory(); }

function renderHistory() {
  const q = (document.getElementById('history-search')?.value||'').trim();
  let filtered = S.historyData;
  if (q) filtered = filtered.filter(h=>h.company.includes(q)||h.name.includes(q)||h.person.includes(q));
  if (S.hFilter!=='すべて') filtered = filtered.filter(h=>h.company===S.hFilter);
  const grouped = {};
  filtered.forEach(h=>{ if(!grouped[h.company]) grouped[h.company]=[]; grouped[h.company].push(h); });
  const el = document.getElementById('history-content');
  if (!Object.keys(grouped).length) { el.innerHTML='<div class="no-result">該当する履歴がありません</div>'; return; }
  el.innerHTML = Object.entries(grouped).map(([company,items])=>`
    <div class="company-block">
      <div class="company-hd">
        <span class="company-name">${company}</span>
        <span class="company-count">${items.length}件</span>
      </div>
      ${items.map(h=>`
        <div class="h-item">
          <div class="h-date">${h.date}</div>
          <div class="h-body">
            <div class="h-name">${h.name}</div>
            <div class="h-detail">${h.detail}</div>
            <div class="h-footer">
              <span class="h-person">${h.person}</span>
              <div class="badges">
                <span class="badge ${h.purpose==='謝罪'?'badge-warn':''}">${h.purpose}</span>
                ${h.delivery?'<span class="badge">配送</span>':''}
              </div>
            </div>
          </div>
        </div>`).join('')}
    </div>`).join('');
}
</script>
</body>
</html>
